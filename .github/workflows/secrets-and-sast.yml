# ============================================================================
# Security Scanning — calls eSolia/devkit's reusable secrets-and-sast workflow
# ============================================================================
# Provides gitleaks secret scanning, Trivy filesystem scanning, Semgrep SAST,
# and a CycloneDX SBOM via Syft. Runs alongside ci.yml and publish.yml.
# ============================================================================

name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  scan:
    name: Secrets & SAST
    uses: eSolia/devkit/.github/workflows/secrets-and-sast.yml@main
    with:
      source-paths: "mod.ts src"
      run-sbom: true
    secrets:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
